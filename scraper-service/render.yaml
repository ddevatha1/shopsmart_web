services:
  - type: web
    name: shopsmart-scraper-service
    runtime: node
    plan: free
    rootDir: scraper-service
    buildCommand: npm install && npx playwright install --with-deps chromium && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SCRAPER_SERVICE_TOKEN
        sync: false
